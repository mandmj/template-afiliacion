name: Actualizar precios Amazon

on:
  schedule:
    # Todos los lunes a las 07:00 UTC (09:00 Madrid invierno, 08:00 verano)
    - cron: '0 7 * * 1'
  workflow_dispatch: # Permite lanzarlo manualmente desde la pestaña Actions

permissions:
  contents: write # Necesario para que el bot haga commit + push

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update prices
        env:
          AMAZON_PARTNER_TAG: {{AMAZON_TAG}}
          AMAZON_MARKETPLACE: www.amazon.es
        run: node scripts/update-prices.mjs --delay 4000

      - name: Commit changes
        run: |
          git config user.name "precios-bot"
          git config user.email "precios-bot@users.noreply.github.com"
          git add src/data/products src/content/reviews
          if git diff --staged --quiet; then
            echo "Sin cambios de precio esta semana."
            exit 0
          fi
          git commit -m "chore: actualización semanal de precios Amazon"
          git push
