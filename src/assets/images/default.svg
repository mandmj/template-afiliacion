<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ecfccb"/>
      <stop offset="0.6" stop-color="#d9f99d"/>
      <stop offset="1" stop-color="#84cc16"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.2" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Decoración: círculos grandes -->
  <circle cx="1050" cy="120" r="220" fill="#84cc16" fill-opacity="0.25"/>
  <circle cx="1100" cy="530" r="140" fill="#65a30d" fill-opacity="0.3"/>

  <!-- Título principal -->
  <text x="80" y="220" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="82" font-weight="800" fill="#0a0a0a" letter-spacing="-2">
    Comprar
  </text>
  <text x="80" y="310" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="82" font-weight="800" fill="#0a0a0a" letter-spacing="-2">
    {{SITE_NAME_OG}}
  </text>

  <!-- Subtítulo -->
  <text x="80" y="390" font-family="'Inter', system-ui, sans-serif"
        font-size="32" font-weight="500" fill="#1f2937">
    Reviews · Comparativas · Guías 2026
  </text>

  <!-- Badge lima -->
  <rect x="80" y="440" width="320" height="64" rx="32" fill="#0a0a0a"/>
  <text x="240" y="482" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
        font-size="28" font-weight="700" fill="#d9f99d" text-anchor="middle">
    Análisis editorial
  </text>

  <!-- Dominio -->
  <text x="80" y="560" font-family="'Inter', system-ui, sans-serif"
        font-size="24" font-weight="600" fill="#374151">
    {{DOMAIN}}
  </text>

  <!-- Decoración -->
  <g transform="translate(860, 280)">
    <circle cx="40" cy="160" r="32" fill="#0a0a0a"/>
    <circle cx="40" cy="160" r="22" fill="none" stroke="#84cc16" stroke-width="3"/>
    <circle cx="40" cy="160" r="6" fill="#84cc16"/>
    <circle cx="200" cy="160" r="32" fill="#0a0a0a"/>
    <circle cx="200" cy="160" r="22" fill="none" stroke="#84cc16" stroke-width="3"/>
    <circle cx="200" cy="160" r="6" fill="#84cc16"/>
    <rect x="30" y="140" width="180" height="14" rx="4" fill="#1f2937"/>
    <rect x="190" y="40" width="12" height="108" rx="3" fill="#1f2937"/>
    <rect x="160" y="34" width="76" height="9" rx="4" fill="#0a0a0a"/>
    <rect x="150" y="32" width="18" height="13" rx="3" fill="#84cc16"/>
    <rect x="228" y="32" width="18" height="13" rx="3" fill="#84cc16"/>
    <rect x="180" y="12" width="30" height="22" rx="3" fill="#0a0a0a"/>
    <rect x="184" y="16" width="22" height="14" rx="1" fill="#84cc16" opacity="0.9"/>
  </g>
</svg>
